name: "Build and Deploy"

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --future --trace -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Verify CVE page output
        shell: bash
        run: |
          OUTPUT_ROOT="_site${{ steps.pages.outputs.base_path }}"
          CVE_PAGE="$OUTPUT_ROOT/posts/cve-2026-11855-simple-membership-stored-xss/index.html"

          echo "Checking generated CVE page: $CVE_PAGE"
          find "$OUTPUT_ROOT/posts" -maxdepth 3 -type f 2>/dev/null | sort | head -200 || true

          if [[ ! -f "$CVE_PAGE" ]]; then
            echo "::error::Jekyll did not generate the expected CVE page at $CVE_PAGE"
            exit 1
          fi

          echo "CVE page generated successfully."

      - name: Test site links
        continue-on-error: true
        run: |
          bundle exec htmlproofer "_site${{ steps.pages.outputs.base_path }}" \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
